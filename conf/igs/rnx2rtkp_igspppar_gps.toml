# MRTKLIB Configuration (TOML v1.0.0)
# IGS-products PPP-AR, GPS-only variant of rnx2rtkp_igspppar.toml (#142).
#
# GPS-only on a short window has too few satellites for reliable narrow-lane
# fixing (the wide-lane still fixes); this config is used by the igs_pppar_gps
# regression test to guard the uncombined OSB measurement model and the
# dual-frequency AR path (no EWL ambiguity) against regressions. For routine
# integer PPP-AR use rnx2rtkp_igspppar.toml (GPS+Galileo).

[positioning]
mode = "ppp-static"
frequency = "l1+2"
solution_type = "forward"
elevation_mask = 15.0
dynamics = false
satellite_ephemeris = "precise"
systems = ["GPS"]
correction = "igs"

[positioning.corrections]
satellite_antenna = true
receiver_antenna = true
phase_windup = "on"
tidal_correction = "on"

[positioning.atmosphere]
ionosphere = "est-stec"     # uncombined (IONOOPT_EST) -- required for PPP-AR
troposphere = "est-ztdgrad"

[ambiguity_resolution]
mode = "continuous"
systems = 1         # GPS only

[ambiguity_resolution.thresholds]
ratio = 2.0
ratio1 = 1.5
elevation_mask = 15.0

[ambiguity_resolution.counters]
min_fix = 10
max_iterations = 10

[rejection]
innovation = 30.0

[slip_detection]
threshold = 0.05

[kalman_filter]
iterations = 1

[kalman_filter.measurement_error]
phase = 0.003
phase_elevation = 0.003

[kalman_filter.initial_std]
bias = 30.0
ionosphere = 0.3
troposphere = 0.3

[kalman_filter.process_noise]
bias = 0.0001
ionosphere = 0.01
troposphere = 0.0001

[receiver]
max_age = 30.0
max_bias_dt = 86400.0

[output]
format = "llh"
height_type = "ellipsoidal"
static_solution = "all"

[files]
satellite_atx = "./tests/data/igs/igs20_trim.atx"
receiver_atx = "./tests/data/igs/igs20_trim.atx"
bias_sinex = "./tests/data/igs/COD0MGXFIN_2026021_01D_OSB.BIA"
