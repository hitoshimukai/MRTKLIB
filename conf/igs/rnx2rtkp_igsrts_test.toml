# MRTKLIB Configuration (TOML v1.0.0)
# IGS-RTS float-PPP regression test (#138): AIRA (Aira, Japan, IGS) GPS+GAL,
# IGS combined RTCM-SSR (SSRA02IGS0, code-bias-only) + broadcast eph.
#
# This config exercises the correction = "igs-rts" code path (RTKLIB float-PPP
# measurement model, not the MADOCA SSR-bias path). It is not a user sample
# (see rnx2rtkp_igsrts.toml). The receiver antenna type is set explicitly
# because the real-time MSM stream's RINEX header carries no antenna name;
# satellite antenna PCV is off (SSR_APC orbits are antenna-phase-center based).

[positioning]
mode = "ppp-static"
frequency = "l1+2"
solution_type = "forward"
elevation_mask = 15.0
dynamics = false
satellite_ephemeris = "brdc+ssrapc"
systems = ["GPS", "Galileo"]
correction = "igs-rts"

[positioning.corrections]
satellite_antenna = false
receiver_antenna = true
phase_windup = "on"
tidal_correction = "on"

[positioning.atmosphere]
ionosphere = "dual-freq"
troposphere = "est-ztdgrad"

[ambiguity_resolution]
mode = "off"

[rejection]
innovation = 30.0

[slip_detection]
threshold = 0.05

[kalman_filter]
iterations = 1

[kalman_filter.measurement_error]
phase = 0.003
phase_elevation = 0.003

[kalman_filter.initial_std]
bias = 30.0
ionosphere = 0.03
troposphere = 0.3

[kalman_filter.process_noise]
bias = 0.0001
ionosphere = 0.001
troposphere = 0.0001
accel_h = 1.0
accel_v = 0.1
clock_stability = 5e-12

[receiver]
max_age = 30.0

[antenna.rover]
type = "TRM59800.00     SCIS" # real-time MSM RINEX carries no antenna name

[files]
receiver_atx = "./tests/data/igs/igs20_aira.atx"

[output]
format = "llh"
height_type = "ellipsoidal"
static_solution = "all"
