# MRTKLIB Configuration (TOML v1.0.0)
# Conventional IGS-products float PPP (precise SP3/CLK), GPS + Galileo.
# Used by the igs_ppp regression test (tests/data/igs/igs_testdata.tar.gz).

[positioning]
mode = "ppp-static"
frequency = "l1+2"
solution_type = "combined"
elevation_mask = 15.0
dynamics = false
satellite_ephemeris = "precise"
systems = ["GPS", "Galileo"]
correction = "igs"

[positioning.corrections]
satellite_antenna = true
receiver_antenna = true
phase_windup = "on"
tidal_correction = "on"

[positioning.atmosphere]
ionosphere = "dual-freq"
troposphere = "est-ztdgrad"

[ambiguity_resolution]
mode = "off"

[rejection]
innovation = 30.0

[slip_detection]
threshold = 0.05

[kalman_filter]
iterations = 1

[kalman_filter.measurement_error]
phase = 0.003
phase_elevation = 0.003

[kalman_filter.initial_std]
bias = 30.0
ionosphere = 0.03
troposphere = 0.3

[kalman_filter.process_noise]
bias = 0.0001
ionosphere = 0.001
troposphere = 0.0001
accel_h = 1.0
accel_v = 0.1
clock_stability = 5e-12

[receiver]
max_age = 30.0

[output]
format = "llh"
height_type = "ellipsoidal"
static_solution = "all"

[files]
satellite_atx = "./tests/data/igs/igs20_trim.atx"
receiver_atx = "./tests/data/igs/igs20_trim.atx"
