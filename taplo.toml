# taplo configuration — https://taplo.tamasfe.dev/configuration/
# Applies to all TOML files in the repository.

# Skip vendored / local-only TOML so `taplo fmt --check` (CI and local) only
# sees repo-tracked files. Python virtualenvs drop third-party pyproject.toml
# under site-packages; ruff excludes these by default, taplo does not.
exclude = ["**/.venv/**", "**/site-packages/**", "**/node_modules/**"]

[formatting]
align_entries = false       # Don't pad keys with spaces for alignment
align_comments = true       # Align trailing comments within a section
array_trailing_comma = true # Always add trailing comma in multi-line arrays
compact_arrays = true       # Single-line arrays when they fit
column_width = 120          # Wrap threshold
indent_string = "  "        # 2-space indent for nested structures
reorder_keys = false        # Preserve key order (important for config semantics)
